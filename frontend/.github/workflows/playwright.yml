name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Pobranie kodu z repozytorium
      uses: actions/checkout@v4

    - name: Instalacja Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Instalacja zależności
      run: npm install

    - name: Instalacja przeglądarek Playwrighta
      run: npx playwright install --with-deps

    - name: Uruchomienie testów
      run: npx playwright test

    - name: Zapisanie raportu z testów
      uses: actions/upload-artifact@v4
      if: always() # zapisuje raport nawet jeśli testy się wywalą
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
